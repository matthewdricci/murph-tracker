<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Murph Test 2026 — Live</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <main>
    <header>
      <h1 id="title">Murph Test</h1>
      <p id="subtitle">Sat May 16, 2026 &middot; rehearsal for IronHike pipeline &middot; 22 segments</p>
    </header>

    <button id="start-btn" class="start-btn" hidden>▶ Start Murph</button>

    <section class="hero">
      <div class="big">
        <div class="big-num"><span id="laps-done">—</span><span class="big-denom"> / <span id="laps-total">20</span></span></div>
        <div class="big-label">ROUNDS</div>
      </div>
      <div class="progress"><div id="progress-bar"></div></div>
      <div class="sub">
        <span id="elevation" hidden></span>
        <span id="percent">—%</span>
      </div>
    </section>

    <section class="chart-wrap">
      <canvas id="chart" aria-label="Cumulative segments over time"></canvas>
    </section>

    <section class="buffer" id="buffer-box">
      <div class="k">BUFFER</div>
      <div class="v" id="buffer">—</div>
      <div class="note" id="buffer-note"></div>
    </section>

    <section class="due">
      <div class="k">NEXT ROUND DUE BY</div>
      <div class="v" id="due-by">—</div>
      <div class="note" id="due-note"></div>
    </section>

    <section class="dupes" id="dupes" hidden></section>

    <section class="lastlap">
      <div class="row"><span class="k">LAST SEGMENT</span><span class="v" id="last-summit">—</span></div>
      <div class="row"><span class="k">STATUS</span><span class="v" id="status">—</span></div>
    </section>

    <section class="meta">
      <div class="row"><span class="k">ELAPSED</span><span class="v" id="elapsed">—</span></div>
      <div class="row"><span class="k">TO ROUND TARGET</span><span class="v" id="remaining">—</span></div>
    </section>

    <button id="push-btn" class="push-btn" hidden>🔔 Get notified each Murph segment</button>

    <footer>
      <div id="updated">loading…</div>
      <div class="thin">tap any number to refresh</div>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
